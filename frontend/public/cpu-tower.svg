<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CBD5E1"/>
      <stop offset="55%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="gtop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.9"/>
    </radialGradient>
  </defs>
  <!-- soft shadow -->
  <ellipse cx="128" cy="244" rx="74" ry="6" fill="#0F172A" opacity="0.15"/>
  <!-- side panel (3D depth) -->
  <path d="M68,40 L46,60 L46,234 L68,224 Z" fill="url(#g2)"/>
  <!-- top panel -->
  <path d="M68,40 L46,60 L172,60 L194,40 Z" fill="url(#gtop)"/>
  <!-- main front face -->
  <rect x="68" y="40" width="126" height="194" rx="14" fill="url(#g1)" stroke="#64748B" stroke-width="1.5"/>
  <!-- top accent strip -->
  <rect x="80" y="52" width="102" height="3" rx="1.5" fill="#0EA5E9" opacity="0.6"/>
  <!-- power button (glowing blue) -->
  <circle cx="131" cy="80" r="13" fill="#1E293B"/>
  <circle cx="131" cy="80" r="9" fill="url(#glow)"/>
  <circle cx="128" cy="77" r="3" fill="#fff" opacity="0.8"/>
  <!-- DVD slot -->
  <rect x="88" y="110" width="86" height="8" rx="4" fill="#1E293B"/>
  <circle cx="167" cy="114" r="2" fill="#22C55E"/>
  <!-- USB ports -->
  <rect x="92" y="132" width="18" height="7" rx="1.5" fill="#1E293B"/>
  <rect x="114" y="132" width="18" height="7" rx="1.5" fill="#1E293B"/>
  <rect x="136" y="132" width="11" height="7" rx="1.5" fill="#1E293B"/>
  <!-- audio jack -->
  <circle cx="156" cy="135.5" r="3.5" fill="#1E293B"/>
  <circle cx="167" cy="135.5" r="3.5" fill="#FB7185"/>
  <!-- vent grille -->
  <g fill="#475569" opacity="0.55">
    <rect x="88" y="160" width="86" height="2" rx="1"/>
    <rect x="88" y="168" width="86" height="2" rx="1"/>
    <rect x="88" y="176" width="86" height="2" rx="1"/>
    <rect x="88" y="184" width="86" height="2" rx="1"/>
    <rect x="88" y="192" width="86" height="2" rx="1"/>
  </g>
  <!-- LED indicator -->
  <circle cx="180" cy="218" r="3.5" fill="#22C55E"/>
  <!-- cute friendly smile (kid-friendly touch) -->
  <g stroke="#1E293B" stroke-width="2.2" fill="none" stroke-linecap="round">
    <path d="M114,214 Q131,222 148,214"/>
  </g>
  <circle cx="111" cy="207" r="2.5" fill="#1E293B"/>
  <circle cx="151" cy="207" r="2.5" fill="#1E293B"/>
  <!-- tiny highlight on body for shine -->
  <rect x="76" y="48" width="6" height="180" rx="3" fill="#fff" opacity="0.35"/>
  <!-- "CPU" label tiny -->
  <text x="131" y="232" text-anchor="middle" font-family="Fredoka, sans-serif" font-weight="700" font-size="9" fill="#0EA5E9">CPU</text>
</svg>
